nameOverride: api-gateway
namespace: petclinic-dev

service:
  port: 8080

image:
  repository: 720035686687.dkr.ecr.eu-central-1.amazonaws.com/petclinic-dev/api-gateway
  tag: v1.0.0

labels:
  app.kubernetes.io/component: frontend

resources:
  requests:
    cpu: 200m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

env:
  - name: SPRING_PROFILES_ACTIVE
    value: docker

initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command: ['sh', '-c', 'until wget -qO- http://config-server:8888/actuator/health; do sleep 5; done']
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 64Mi
  - name: wait-for-discovery-server
    image: busybox:1.36
    command: ['sh', '-c', 'until wget -qO- http://discovery-server:8761/actuator/health; do sleep 5; done']
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 64Mi
