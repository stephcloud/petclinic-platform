apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: petclinic-dev
  labels:
    app.kubernetes.io/name: config-server
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: config-server
      app.kubernetes.io/part-of: petclinic
  template:
    metadata:
      labels:
        app.kubernetes.io/name: config-server
        app.kubernetes.io/part-of: petclinic
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: infrastructure
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: config-server
          image: 720035686687.dkr.ecr.eu-central-1.amazonaws.com/petclinic-dev/config-server:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8888
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: petclinic-dev
  labels:
    app.kubernetes.io/name: config-server
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: infrastructure
spec:
  selector:
    app.kubernetes.io/name: config-server
    app.kubernetes.io/part-of: petclinic
  ports:
    - name: http
      port: 8888
      targetPort: 8888
